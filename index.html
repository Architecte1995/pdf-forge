<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>PDF Forge — Fusion locale</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #e94560;
            --accent2: #2a9d8f;
            --gold: #ffd700;
            --text: #ffffff;
            --text2: #a0a0c0;
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 20px 16px 12px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-size: 22px;
            color: var(--gold);
            letter-spacing: 2px;
            font-weight: bold;
        }

        header p {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
        }

        /* Zone de drop / sélection */
        .drop-zone {
            margin: 16px;
            padding: 40px 20px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            text-align: center;
            background: var(--surface);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .drop-zone.active {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .drop-zone .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .drop-zone p {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 8px;
        }

        .drop-zone .hint {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
        }

        input[type="file"] {
            display: none;
        }

        /* Bouton principal */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
            min-height: 48px;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c73e54);
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.3);
        }

        .btn-secondary {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #e6c200);
            color: var(--bg);
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3);
        }

        /* Liste des fichiers */
        .file-list {
            margin: 0 16px 16px;
            flex: 1;
            overflow-y: auto;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .file-item.dragging {
            opacity: 0.5;
            border-color: var(--gold);
        }

        .file-item .index {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--gold);
            flex-shrink: 0;
        }

        .file-item .info {
            flex: 1;
            min-width: 0;
        }

        .file-item .name {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .file-item .meta {
            font-size: 11px;
            color: var(--text2);
            margin-top: 2px;
        }

        .file-item .pages-badge {
            font-size: 11px;
            background: var(--surface2);
            padding: 2px 8px;
            border-radius: 8px;
            color: var(--accent2);
            white-space: nowrap;
        }

        .file-item .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .file-item .actions button {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-item .actions button:active {
            background: var(--accent);
            color: white;
            transform: scale(0.9);
        }

        .file-item .actions .remove-btn:active {
            background: #ff4444;
        }

        /* Barre d'action fixe en bas */
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
            background: linear-gradient(to top, var(--bg) 0%, rgba(10,10,15,0.95) 80%, transparent 100%);
            display: flex;
            gap: 10px;
            z-index: 100;
            border-top: 1px solid var(--border);
        }

        .action-bar .btn {
            flex: 1;
        }

        /* Stats */
        .stats {
            margin: 0 16px 100px;
            padding: 12px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stats .stat .value {
            font-size: 20px;
            font-weight: bold;
            color: var(--gold);
        }

        .stats .stat .label {
            font-size: 10px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* Loading */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,15,0.95);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            gap: 16px;
        }

        .overlay.visible {
            display: flex;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .overlay p {
            color: var(--text2);
            font-size: 14px;
        }

        .overlay .progress {
            width: 200px;
            height: 4px;
            background: var(--surface2);
            border-radius: 2px;
            overflow: hidden;
        }

        .overlay .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text2);
            font-size: 14px;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <header>
        <h1>📄 PDF FORGE</h1>
        <p>Fusion locale — aucun fichier ne quitte votre appareil</p>
    </header>

    <div class="drop-zone" id="dropZone">
        <div class="icon">📁</div>
        <p>Appuyez pour sélectionner des PDF</p>
        <p class="hint">ou glissez-déposez ici</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf" multiple>

    <div class="file-list" id="fileList">
        <div class="empty-state" id="emptyState">
            <div class="icon">🕳️</div>
            <p>Aucun PDF sélectionné</p>
        </div>
    </div>

    <div class="stats" id="stats" style="display:none;">
        <div class="stat">
            <div class="value" id="statCount">0</div>
            <div class="label">Fichiers</div>
        </div>
        <div class="stat">
            <div class="value" id="statPages">0</div>
            <div class="label">Pages</div>
        </div>
        <div class="stat">
            <div class="value" id="statSize">0</div>
            <div class="label">Mo</div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn btn-secondary" id="clearBtn" style="flex:0.4;">🗑️</button>
        <button class="btn btn-gold" id="mergeBtn" disabled>🔥 Fusionner</button>
    </div>

    <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <p id="overlayText">Fusion en cours...</p>
        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const emptyState = document.getElementById('emptyState');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const stats = document.getElementById('stats');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const progressBar = document.getElementById('progressBar');

        let files = [];
        let dragSrcIndex = null;

        // Drop zone click
        dropZone.addEventListener('click', () => fileInput.click());

        // File selection
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Drag & drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            const pdfFiles = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
            handleFiles(pdfFiles);
        });

        function handleFiles(newFiles) {
            const pdfFiles = Array.from(newFiles).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
            files = [...files, ...pdfFiles.map(f => ({ file: f, pages: null }))];
            updateList();
            countPages();
        }

        async function countPages() {
            let totalPages = 0;
            for (let i = 0; i < files.length; i++) {
                try {
                    const arrayBuffer = await files[i].file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    files[i].pages = pdf.getPageCount();
                    totalPages += files[i].pages;
                } catch (e) {
                    files[i].pages = '?';
                }
            }
            updateList();
            updateStats(totalPages);
        }

        function formatSize(bytes) {
            return (bytes / 1024 / 1024).toFixed(1);
        }

        function updateStats(totalPages) {
            const totalSize = files.reduce((sum, f) => sum + f.file.size, 0);
            document.getElementById('statCount').textContent = files.length;
            document.getElementById('statPages').textContent = totalPages || 0;
            document.getElementById('statSize').textContent = formatSize(totalSize);
            stats.style.display = files.length ? 'flex' : 'none';
        }

        function updateList() {
            if (files.length === 0) {
                fileList.innerHTML = '';
                fileList.appendChild(emptyState);
                emptyState.style.display = 'block';
                mergeBtn.disabled = true;
                stats.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            fileList.innerHTML = '';

            files.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'file-item';
                div.draggable = true;
                div.dataset.index = index;

                div.innerHTML = `
                    <div class="index">${index + 1}</div>
                    <div class="info">
                        <div class="name">${item.file.name}</div>
                        <div class="meta">${formatSize(item.file.size)} Mo${item.pages !== null ? ' • ' + item.pages + ' pages' : ''}</div>
                    </div>
                    ${item.pages !== null ? `<div class="pages-badge">${item.pages} p.</div>` : ''}
                    <div class="actions">
                        <button onclick="moveUp(${index})" ${index === 0 ? 'disabled style="opacity:0.3"' : ''}>▲</button>
                        <button onclick="moveDown(${index})" ${index === files.length - 1 ? 'disabled style="opacity:0.3"' : ''}>▼</button>
                        <button class="remove-btn" onclick="removeFile(${index})">✕</button>
                    </div>
                `;

                // Touch drag support
                div.addEventListener('dragstart', handleDragStart);
                div.addEventListener('dragover', handleDragOver);
                div.addEventListener('drop', handleDrop);
                div.addEventListener('dragend', handleDragEnd);

                fileList.appendChild(div);
            });

            mergeBtn.disabled = files.length < 2;
        }

        function moveUp(index) {
            if (index === 0) return;
            [files[index], files[index - 1]] = [files[index - 1], files[index]];
            updateList();
        }

        function moveDown(index) {
            if (index === files.length - 1) return;
            [files[index], files[index + 1]] = [files[index + 1], files[index]];
            updateList();
        }

        function removeFile(index) {
            files.splice(index, 1);
            updateList();
            let totalPages = files.reduce((sum, f) => sum + (f.pages || 0), 0);
            updateStats(totalPages);
        }

        // Drag & drop reorder
        function handleDragStart(e) {
            dragSrcIndex = parseInt(this.dataset.index);
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDrop(e) {
            e.stopPropagation();
            const dragDestIndex = parseInt(this.dataset.index);
            if (dragSrcIndex !== dragDestIndex) {
                const item = files.splice(dragSrcIndex, 1)[0];
                files.splice(dragDestIndex, 0, item);
                updateList();
            }
            return false;
        }

        function handleDragEnd() {
            this.classList.remove('dragging');
        }

        // Clear all
        clearBtn.addEventListener('click', () => {
            files = [];
            fileInput.value = '';
            updateList();
            stats.style.display = 'none';
        });

        // Merge
        mergeBtn.addEventListener('click', async () => {
            if (files.length < 2) return;

            overlay.classList.add('visible');
            overlayText.textContent = 'Chargement des PDF...';
            progressBar.style.width = '0%';

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                for (let i = 0; i < files.length; i++) {
                    overlayText.textContent = `Fusion : ${files[i].file.name} (${i+1}/${files.length})`;
                    progressBar.style.width = `${((i + 0.5) / files.length) * 100}%`;

                    const arrayBuffer = await files[i].file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(arrayBuffer);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(page => mergedPdf.addPage(page));

                    progressBar.style.width = `${((i + 1) / files.length) * 100}%`;
                }

                overlayText.textContent = 'Génération du fichier...';
                const mergedPdfFile = await mergedPdf.save();

                const blob = new Blob([mergedPdfFile], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const date = new Date().toISOString().slice(0,10).replace(/-/g,'');
                const filename = `PDF_Forge_${date}_${files.length}fichiers.pdf`;

                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                overlayText.textContent = '✅ Terminé !';
                setTimeout(() => {
                    overlay.classList.remove('visible');
                }, 800);

            } catch (err) {
                overlayText.textContent = '❌ Erreur : ' + err.message;
                setTimeout(() => {
                    overlay.classList.remove('visible');
                }, 3000);
            }
        });
    </script>
</body>
</html>
